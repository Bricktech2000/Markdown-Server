<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/rss.xml" />

    <!-- https://github.com/tonsky/FiraCode -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/firacode@6.2.0/distr/fira_code.css" />

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <style>
      :root {
        --foreground: #fff;
        --background: #000;
        /* dark-mode scrollbars */
        color-scheme: dark;
      }

      body {
        margin: 0 auto;
        max-width: 90ch;
        line-height: 1.4;
        overflow-wrap: break-word;
        /* prevent layout shift */
        overflow-y: scroll;
        font-family: 'Fira Code', monospace;
        /* Fira Code renders larger than other fonts */
        font-size: 0.875em;
        font-feature-settings: 'cv02', 'cv06', 'zero', 'ss04', 'ss07';
        font-variant-numeric: oldstyle-nums;
        background: var(--background);
        color: var(--foreground);
      }

      /* ensure header and footer span the whole width on narrow pages */
      body > table {
        table-layout: fixed;
        width: 100%;
      }

      /* AutoLiningFigures() custom extension */
      i {
        font-style: inherit;
        font-variant-numeric: lining-nums;
      }

      code {
        white-space: pre-wrap;
        font-family: 'Fira Code', monospace;
        /* letter-spacing = (1em - font-size) / font-size * 1ch */
        font-size: 0.8em;
        letter-spacing: 0.25ch;
        vertical-align: middle;
        /* compensate for smaller font size */
        font-weight: 500;
      }

      pre code {
        white-space: pre;
        display: block;
        overflow-x: auto;
        /* lined up with <blockquote>s */
        margin: 0 40px;
      }

      h1,
      h2,
      h3 {
        font-size: 1em;
        text-transform: uppercase;
        font-variant-numeric: lining-nums;
        margin-top: 2em;
      }

      h1 {
        font-weight: 600;
        letter-spacing: 0.25ch;
      }

      h2 {
        font-weight: 600;
      }

      h3 {
        font-weight: 400;
      }

      h1 code {
        /* compensate for smaller font size */
        font-weight: 700;
        /* (h1-letter-spacing + 1) * (code-letter-spacing + 1) - 1 */
        letter-spacing: 0.5625ch;
      }

      h2 code {
        /* compensate for smaller font size */
        font-weight: 700;
      }

      a {
        color: inherit;
        text-decoration: underline;
        text-underline-offset: 0.2em;
      }

      th,
      strong {
        font-weight: 600;
      }

      th code,
      strong code {
        /* compensate for smaller font size */
        font-weight: 700;
      }

      th,
      td {
        padding: 0.5em 1em;
      }

      img {
        display: block;
        max-width: 100%;
      }

      blockquote {
        /* lined up with <ul> bullets */
        padding-left: 15px;
        margin-left: 25px;
        border-left: 2px solid var(--foreground);
      }

      li:has(input[type='checkbox']) {
        list-style-type: none;
      }

      li input[type='checkbox'] {
        /* lined up with <ul> bullets */
        margin: 0 0 0 -20px;
        vertical-align: middle;
      }

      header,
      footer {
        display: flex;
        justify-content: space-between;
      }

      /* keywords, built-ins, headings */
      .highlight :is(.k, .kc, .kd, .kn, .kp, .kr, .kt),
      .highlight :is(.nb, .bp, .ow, .l),
      .highlight :is(.gh, .gu) {
        font-weight: 700;
      }

      /* comments */
      .highlight :is(.c, .cm, .c1, .cs) {
        font-weight: 400;
        font-style: italic;
      }

      /* operators, escapes */
      .highlight :is(.o, .p),
      .highlight :is(.se) {
        font-weight: 400;
      }

      /* numbers, strings, emphasis */
      .highlight :is(.m, .mb, .mf, .mh, .mi, .mo, .il),
      .highlight :is(.s, .sb, .sc, .sd, .s2, .sh, .si, .sx, .sr, .s1, .ss),
      .highlight :is(.ge, .gs) {
        font-style: italic;
      }

      /* deleted */
      .highlight :is(.gd) {
        text-decoration: line-through;
      }

      /* inserted */
      .highlight :is(.gi) {
        text-decoration: underline;
        text-underline-offset: 0.2em;
      }

      @media print {
        :root {
          --foreground: #000;
          --background: #fff;
          /* white margins */
          color-scheme: light;
        }

        body {
          padding: 0;
          font-size: 0.625em;
        }

        pre code {
          white-space: pre-wrap;
          overflow-x: visible;
        }
      }
    </style>
  </head>

  <body>
    <!-- using a table so header and footer are repeated on every page when printing -->
    <table>
      <thead>
        <tr>
          <td>
            <header>
              <span>{{ breadcrumb|safe }}</span>
              <a href="/rss.xml">RSS</a>
            </header>
            <hr />
          </td>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>
            <main>{{ content|safe }}</main>
          </td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td>
            <hr />
            <footer>
              <span></span>
              <span>&copy;&nbsp;<i>{{ year|safe }}</i> Emilien Breton</span>
              <span></span>
            </footer>
          </td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
